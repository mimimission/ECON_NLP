# RAG evidence retrieval and explanation configuration

version: "1.0"

retrieval:
  time_window_rule: strict_no_future
  description: >
    For each forecast at time T (forecasting PAYEMS at T+1),
    only retrieve articles where article_date <= T.
    This is a hard constraint — never retrieve future articles.

  preferred_window_months: 2
  description_window: >
    Prefer articles from T-1 and T (the month before and the forecast month).
    These are most contemporaneous with the forecast decision.

  max_articles_per_forecast: 10
  min_relevance_score: 0.0
  scoring_method: keyword_count
  ranking: by_recency_then_query_match

  query_group_weights:
    layoffs: 1.5
    hiring: 1.5
    unemployment: 1.2
    job_openings: 1.2
    wages: 1.0
    uncertainty: 1.0

explanation:
  provider: deepseek
  base_url: https://api.deepseek.com
  model: deepseek-reasoner
  temperature: 0.0
  max_tokens: 500
  timeout_seconds: 30
  retry_attempts: 3

  prompt_template: |
    You are an economic analyst writing a plain-language explanation of a payroll forecast.

    Forecast context:
    - Forecast month: {forecast_month}
    - Predicted nonfarm payroll change: {prediction:+.0f} thousand jobs
    - Forecast direction: {direction}

    Retrieved news evidence (published before {forecast_date}):
    {evidence_block}

    Instructions:
    1. Explain whether the retrieved labor-market news supports the forecast direction.
    2. Cite specific article titles and URLs as evidence.
    3. If the evidence is weak or contradictory, say so clearly.
    4. Do NOT invent facts not present in the evidence above.
    5. Write 3-5 sentences maximum.
    6. If evidence is insufficient, state: "Available news evidence is insufficient to strongly support this forecast."

  fallback:
    use_if_no_api_key: true
    template: |
      Forecast for {forecast_month}: predicted nonfarm payroll change of {prediction:+.0f}K jobs.
      Retrieved {n_articles} labor-market news articles from the prior period.
      Top signals: {top_signals}.
      Note: This explanation uses a deterministic template (DeepSeek API key not set).

evaluation:
  manual_evaluation_fields:
    - forecast_month
    - explanation
    - cited_urls
    - correct_time_window_0_1
    - labor_relevance_0_1
    - citation_support_0_1
    - faithfulness_1_5
    - usefulness_1_5
    - notes

  scoring_guide:
    correct_time_window_0_1: "1 = all cited articles are dated before forecast_date; 0 = any future article cited"
    labor_relevance_0_1: "1 = cited articles are genuinely about the US labor market; 0 = off-topic"
    citation_support_0_1: "1 = cited articles support the claims made; 0 = mismatch between article content and claims"
    faithfulness_1_5: "5 = no invented facts; 1 = multiple unsupported claims"
    usefulness_1_5: "5 = explanation clearly helps interpret the forecast; 1 = generic or unhelpful"
